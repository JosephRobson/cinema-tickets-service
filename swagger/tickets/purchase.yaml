post:
  tags:
    - tickets
  summary: Submit an order and purchase a number of tickets
  x-eov-operation-id: PurchaseTickets
  x-eov-operation-handler: "ticketsController"
  requestBody:
    description: Takes an account ID and a quantity of tickets. If the order passes validation, seats will be booked and account will be charged
    required: true
    content:
      application/json:
        schema:
          $ref: '#components/schemas/order'
  responses:
    "201":
      description: Successful order passed validation, seats were booked and account was charged.
    "400":
      description: Invalid order.